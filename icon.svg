<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="starGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#06D6A0" flood-opacity="0.70"/>
    </filter>
    <linearGradient id="starSheen" x1="15%" y1="10%" x2="70%" y2="90%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Charcoal-navy circle background (locked palette #0E1419) -->
  <circle cx="256" cy="256" r="256" fill="#0E1419"/>

  <!-- Main star — emerald with glow drop-shadow -->
  <polygon
    points="256,108 291,208 396,210 312,272 342,372 256,314 170,372 200,272 116,210 221,208"
    fill="#06D6A0" filter="url(#starGlow)"/>

  <!-- Sheen overlay on star for glass/premium finish -->
  <polygon
    points="256,108 291,208 396,210 312,272 342,372 256,314 170,372 200,272 116,210 221,208"
    fill="url(#starSheen)"/>
</svg>
