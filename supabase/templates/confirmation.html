<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="x-apple-disable-message-reformatting">
<meta name="color-scheme" content="dark light">
<meta name="supported-color-schemes" content="dark light">
<title>Confirm your CallMagnet account</title>
</head>
<body style="margin:0;padding:0;background:#0E1419;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:rgba(255,255,255,0.92);-webkit-text-size-adjust:100%;">
<div style="display:none;max-height:0;overflow:hidden;font-size:1px;line-height:1px;color:transparent;">Welcome to CallMagnet. Tap to confirm your account.</div>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0E1419;">
  <tr>
    <td align="center" style="padding:32px 16px 24px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;background:rgba(255,255,255,0.04);border:1px solid rgba(6,214,160,0.22);border-radius:14px;">
        <tr>
          <td style="padding:36px 30px 32px;color:rgba(255,255,255,0.92);">
            <div style="font-size:14px;letter-spacing:0.16em;color:#06D6A0;text-transform:uppercase;font-weight:700;margin-bottom:28px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">★ CallMagnet</div>
            <h1 style="margin:0 0 12px;font-size:22px;font-weight:600;color:rgba(255,255,255,0.92);letter-spacing:-0.01em;">Welcome — confirm your account</h1>
            <p style="margin:0 0 28px;font-size:15px;line-height:1.55;color:rgba(255,255,255,0.78);">Thanks for signing up to CallMagnet. Tap below to confirm your account and finish setup.</p>
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td align="center" style="padding:0 0 20px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#06D6A0;color:#0a1110;text-decoration:none;font-weight:700;font-size:15px;padding:14px 30px;border-radius:10px;letter-spacing:0.01em;">Confirm your account</a>
            </td></tr></table>
            <p style="margin:20px 0 0;font-size:12px;line-height:1.5;color:rgba(255,255,255,0.45);">If you didn't sign up to CallMagnet, you can ignore this email.</p>
          </td>
        </tr>
      </table>
      <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:18px;letter-spacing:0.06em;">CallMagnet</div>
    </td>
  </tr>
</table>
</body>
</html>
