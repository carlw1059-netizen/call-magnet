<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E1419">
<title>CallMagnet</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; min-height: 100%;
    background: #0E1419;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  /* ── fade-in animation ─────────────────────────────────────────────────── */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  #app { animation: fadeIn 0.4s ease both; }

  /* ── full-screen layout ────────────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh; /* dynamic viewport on iOS */
  }

  /* ── hero / background area (top 35%) ─────────────────────────────────── */
  .hero {
    position: relative;
    flex: 0 0 35vh;
    flex: 0 0 35dvh;
    overflow: hidden;
    background: #1C2730; /* fallback charcoal */
    display: flex;
    align-items: flex-end;
  }
  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  /* dark gradient overlay so white text always readable */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(14,20,25,0.15) 0%,
      rgba(14,20,25,0.55) 60%,
      rgba(14,20,25,0.88) 100%
    );
  }
  .hero-no-image {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero-no-image .star-icon {
    font-size: 64px;
    color: #06D6A0;
    opacity: 0.45;
    user-select: none;
  }
  .hero-text {
    position: relative; /* above overlay */
    z-index: 1;
    padding: 0 20px 20px;
    width: 100%;
  }
  .hero-business-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    letter-spacing: -0.01em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }

  /* ── content area (below hero) ─────────────────────────────────────────── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 20px 12px;
  }

  /* ── promo text ─────────────────────────────────────────────────────────── */
  .promo-text {
    font-size: 15px;
    color: rgba(255,255,255,0.88);
    line-height: 1.5;
    margin-bottom: 20px;
    text-align: center;
  }

  /* ── button stack ───────────────────────────────────────────────────────── */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .tap-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid #06D6A0;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    text-align: center;
    letter-spacing: 0.01em;
    line-height: 1.3;
    transition: background 0.12s, color 0.12s, transform 0.08s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .tap-btn:active, .tap-btn.tapped {
    background: #06D6A0;
    color: #0E1419;
    transform: scale(0.98);
  }

  /* ── "no booking url" feedback message ─────────────────────────────────── */
  .no-url-msg {
    text-align: center;
    margin-top: 16px;
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    display: none;
  }
  .no-url-msg.visible { display: block; }

  /* ── footer ─────────────────────────────────────────────────────────────── */
  .footer {
    text-align: center;
    padding: 16px 0 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .footer .star { color: rgba(6,214,160,0.55); }

  /* ── not-found / error states ───────────────────────────────────────────── */
  .state-msg {
    flex: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .state-msg.visible { display: flex; }
  .state-msg h2 { font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.85); margin-bottom: 10px; }
  .state-msg p  { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.5; }

  /* ── loading spinner ────────────────────────────────────────────────────── */
  .spinner-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(6,214,160,0.2);
    border-top-color: #06D6A0;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app">
  <!-- Loading state (default until JS runs) -->
  <div class="spinner-wrap" id="stateLoading">
    <div class="spinner"></div>
  </div>

  <!-- Not found state -->
  <div class="state-msg" id="stateNotFound">
    <h2>This page isn't available</h2>
    <p>The link you followed may have expired or the business is no longer active.</p>
  </div>

  <!-- Main page (hidden until client loaded) -->
  <div id="mainPage" style="display:none; flex:1; display:none; flex-direction:column; min-height:100vh; min-height:100dvh;">

    <!-- Hero -->
    <div class="hero" id="hero">
      <!-- Background image injected by JS -->
      <div class="hero-no-image" id="heroNoImage" style="display:none">
        <span class="star-icon">★</span>
      </div>
      <div class="hero-text">
        <div class="hero-business-name" id="heroBusinessName"></div>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="promo-text" id="promoText" style="display:none"></div>
      <div class="buttons" id="buttonsWrap"></div>
      <div class="no-url-msg" id="noUrlMsg">We'll be in touch soon.</div>
    </div>

    <!-- Footer -->
    <div class="footer">Powered by <span class="star">★</span> CallMagnet</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var SUPABASE_URL     = 'https://iskvvnhacqdxybpmwuni.supabase.co';
  var SUPABASE_ANON    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlza3Z2bmhhY3FkeHlicG13dW5pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTAyOTYsImV4cCI6MjA5MDA4NjI5Nn0.c3uR-CSQXsgfYMnzK8KOxZjoqRPwaMsUuGpMPwvCsk8';
  var FUNCTION_URL     = SUPABASE_URL + '/functions/v1/log-middle-man-tap';

  // ── Extract slug from pathname: /b/brunswick-bistro → "brunswick-bistro" ──
  function extractSlug() {
    var parts = window.location.pathname.replace(/^\/+|\/+$/g, '').split('/');
    // parts[0] = 'b', parts[1] = slug
    if (parts.length >= 2 && parts[0] === 'b') {
      return parts[1] || '';
    }
    return '';
  }

  function showState(id) {
    document.getElementById('stateLoading').style.display  = 'none';
    document.getElementById('stateNotFound').classList.remove('visible');
    document.getElementById('mainPage').style.display      = 'none';
    if (id === 'loading') {
      document.getElementById('stateLoading').style.display = 'flex';
    } else if (id === 'notFound') {
      document.getElementById('stateNotFound').classList.add('visible');
    } else if (id === 'main') {
      document.getElementById('mainPage').style.display = 'flex';
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // ── Fetch client data from Supabase REST API ──────────────────────────────
  async function fetchClient(slug) {
    var url = SUPABASE_URL + '/rest/v1/clients'
      + '?middle_man_slug=eq.' + encodeURIComponent(slug)
      + '&account_status=eq.active'
      + '&select=business_name,middle_man_background_url,middle_man_promo_text,middle_man_buttons,booking_url,vertical'
      + '&limit=1';
    var res = await fetch(url, {
      headers: {
        'apikey':        SUPABASE_ANON,
        'Authorization': 'Bearer ' + SUPABASE_ANON,
      }
    });
    if (!res.ok) throw new Error('Lookup failed: ' + res.status);
    var rows = await res.json();
    return rows.length > 0 ? rows[0] : null;
  }

  // ── Render the page from client data ─────────────────────────────────────
  function render(client, slug) {
    // Hero background
    var hero = document.getElementById('hero');
    if (client.middle_man_background_url) {
      var img = document.createElement('img');
      img.className = 'hero-img';
      img.src = client.middle_man_background_url;
      img.alt = '';
      img.setAttribute('aria-hidden', 'true');
      hero.insertBefore(img, hero.firstChild);
      document.getElementById('heroNoImage').style.display = 'none';
    } else {
      document.getElementById('heroNoImage').style.display = 'flex';
    }

    // Business name
    document.getElementById('heroBusinessName').textContent = client.business_name || '';

    // Promo text
    var promoEl = document.getElementById('promoText');
    if (client.middle_man_promo_text) {
      promoEl.textContent = client.middle_man_promo_text;
      promoEl.style.display = 'block';
    }

    // Buttons
    var buttons = [];
    try {
      buttons = Array.isArray(client.middle_man_buttons) ? client.middle_man_buttons : [];
    } catch (_) { buttons = []; }

    var enabled = buttons
      .filter(function(b) { return b && b.enabled !== false; })
      .sort(function(a, b) { return (a.sort_order || 0) - (b.sort_order || 0); });

    var wrap = document.getElementById('buttonsWrap');
    if (enabled.length === 0) {
      wrap.style.display = 'none';
    } else {
      enabled.forEach(function(btn) {
        var el = document.createElement('button');
        el.className = 'tap-btn';
        el.textContent = btn.label || '';
        el.setAttribute('data-intent', btn.label || '');
        el.addEventListener('click', function() {
          handleTap(el, client, slug);
        });
        wrap.appendChild(el);
      });
    }

    // Page title
    document.title = client.business_name || 'CallMagnet';

    showState('main');
  }

  // ── Handle button tap ─────────────────────────────────────────────────────
  function handleTap(btnEl, client, slug) {
    var intent = btnEl.getAttribute('data-intent') || '';
    btnEl.classList.add('tapped');

    // 1. Fire-and-forget log (don't await)
    fetch(FUNCTION_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: slug, intent: intent }),
    }).catch(function() {/* silent — never block redirect */});

    // 2. Redirect after 300ms (gives the tap animation time to show)
    var bookingUrl = (client.booking_url || '').trim();
    if (bookingUrl) {
      setTimeout(function() {
        window.location.href = bookingUrl;
      }, 300);
    } else {
      // No booking URL — show "we'll be in touch" message
      setTimeout(function() {
        btnEl.classList.remove('tapped');
        document.getElementById('noUrlMsg').classList.add('visible');
      }, 300);
    }
  }

  // ── Boot ─────────────────────────────────────────────────────────────────
  async function boot() {
    showState('loading');

    var slug = extractSlug();
    if (!slug) {
      showState('notFound');
      return;
    }

    var client;
    try {
      client = await fetchClient(slug);
    } catch (err) {
      console.error('b.html: fetch error', err);
      showState('notFound');
      return;
    }

    if (!client) {
      showState('notFound');
      return;
    }

    render(client, slug);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
