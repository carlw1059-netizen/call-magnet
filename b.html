<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E1419">
<meta name="color-scheme" content="dark">
<title>CallMagnet</title>
<script>
  /* Force the Progressier service worker to revalidate on every load.
     Without this, SW serves stale cached assets even after a hard refresh. */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
      for (var r of registrations) { r.update(); }
    });
  }
</script>
<link rel="stylesheet" href="https://callmagnet.com.au/assets/css/middleman.css?v=20260624l">
</head>
<body>

<!-- Full-screen background layers (z-index 0 and 1) -->
<div id="bgFixed"></div>
<div id="bgOverlay"></div>

<div id="app">

  <!-- Tap-outside catcher: transparent, z-index 5, shown when a form is open.
       Sits above the video/overlay (z-index 0–1) but below the open btn-unit
       (z-index 10). Clicking it calls closeForm(). -->
  <div id="tapCatcher"></div>

  <!-- Skeleton loading state -->
  <div id="skeleton">
    <div class="skel-header"></div>
    <div class="skel-spacer"></div>
    <div class="skel-buttons">
      <div class="skel-btn"></div>
      <div class="skel-btn"></div>
      <div class="skel-btn"></div>
      <div class="skel-btn"></div>
    </div>
  </div>

  <!-- Not-found state (hidden by default) -->
  <div id="stateNotFound" class="state-cover" style="display:none">
    <h2>This page isn't available</h2>
    <p>The link you followed may have expired or the business is no longer active.</p>
  </div>

  <!-- Main page (hidden until client loaded) -->
  <div id="mainPage">

    <!-- Text group — business name, promo text, section label — centred above buttons -->
    <div class="page-header" id="pageHeader">
      <div class="hero-business-name" id="heroBusinessName"></div>
    </div>

    <!-- Flexible spacer: expands to push buttons to lower screen when bg image present -->
    <div id="contentSpacer"></div>

    <!-- Buttons + forms -->
    <div class="content" id="content">
      <div class="buttons" id="buttonsWrap"></div>

      <!-- "See what's on" — injected if middle_man_show_whats_on = true -->
      <div id="whatsOnSection" style="display:none">
        <hr class="whats-on-divider">
        <button class="whats-on-btn" id="whatsOnBtn" type="button">See what's on ↓</button>
        <div class="whats-on-content" id="whatsOnContent">
          <div class="whats-on-inner" id="whatsOnInner"></div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-powered">Powered by <span class="star">★</span> CallMagnet</div>
      <a class="footer-stop" href="#" id="stopTextsLink" style="display:none">Stop these texts</a>
    </div>

  </div><!-- /mainPage -->

</div><!-- /app -->

<script src="https://callmagnet.com.au/assets/js/middleman.js?v=20260624l" defer></script>
</body>
</html>
