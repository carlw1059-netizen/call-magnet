<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E1419">
<title>CallMagnet — Admin Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0E1419; min-height: 100vh; overscroll-behavior: none; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #FFFFFF; -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }

  /* Topbar */
  .topbar {
    flex: 0 0 auto;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.75rem 1.25rem;
    background: rgba(14,20,25,0.92);
    border-bottom: 1px solid rgba(6,214,160,0.15);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 10;
  }
  .logo {
    font-weight: 700; font-size: 16px; letter-spacing: 0.06em; color: #06D6A0;
    text-transform: uppercase; display: flex; align-items: center; gap: 6px;
  }
  .topbar-right { display: flex; gap: 8px; }
  .topbar-btn {
    background: transparent; border: 1px solid rgba(6,214,160,0.25); color: #06D6A0;
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    font-family: inherit; letter-spacing: 0.04em; font-weight: 600;
  }
  .topbar-btn:hover { background: rgba(6,214,160,0.08); }

  /* Shell — sidebar + main */
  .shell {
    flex: 1 1 auto; display: flex; min-height: 0;
  }
  .sidebar {
    flex: 0 0 240px;
    background: rgba(255,255,255,0.02);
    border-right: 1px solid rgba(6,214,160,0.12);
    padding: 1.25rem 0.75rem;
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(255,255,255,0.45);
    padding: 0 12px; margin-bottom: 10px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; margin-bottom: 4px;
    border-radius: 8px;
    color: rgba(255,255,255,0.82); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.12s, color 0.12s;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: rgba(6,214,160,0.06); color: #FFFFFF; }
  .nav-item.active {
    background: rgba(6,214,160,0.10);
    border-color: rgba(6,214,160,0.25);
    color: #06D6A0;
  }
  .nav-item .ic { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
  .nav-item .lbl { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Main */
  .main {
    flex: 1 1 auto; min-width: 0; min-height: 0;
    background: #0E1419; position: relative;
  }
  .tool-frame {
    width: 100%; height: 100%; border: 0; display: block; background: #0E1419;
  }

  /* Auth-gate placeholder states */
  .gate {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    padding: 2rem; text-align: center;
  }
  .gate.visible { display: flex; }
  .gate h2 { font-size: 18px; font-weight: 600; margin-bottom: 0.5rem; color: #FFFFFF; }
  .gate p { font-size: 14px; color: rgba(255,255,255,0.6); }
  .gate p a { color: #06D6A0; }
  .spinner {
    display: inline-block; width: 32px; height: 32px;
    border: 3px solid rgba(6,214,160,0.25); border-top-color: #06D6A0;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-bottom: 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile */
  @media (max-width: 767px) {
    .shell { flex-direction: column; }
    .sidebar {
      flex: 0 0 auto;
      display: flex; gap: 8px;
      overflow-x: auto; overflow-y: hidden;
      padding: 0.75rem 0.75rem; border-right: 0;
      border-bottom: 1px solid rgba(6,214,160,0.12);
      -webkit-overflow-scrolling: touch;
    }
    .sidebar-label { display: none; }
    .nav-item {
      flex-shrink: 0; padding: 8px 14px; margin-bottom: 0;
      font-size: 13px;
    }
    .nav-item .lbl { white-space: nowrap; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="/admin/" class="logo"><span>★</span> CallMagnet — Admin</a>
  <div class="topbar-right">
    <a class="topbar-btn" href="/">Dashboard</a>
    <button class="topbar-btn" id="signoutBtn" onclick="handleSignout()" style="display:none">Sign out</button>
  </div>
</div>

<div class="shell" id="shell" style="display:none">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <iframe id="toolFrame" class="tool-frame" title="Admin tool" referrerpolicy="same-origin"></iframe>
  </main>
</div>

<div class="gate visible" id="gateLoading">
  <div class="spinner"></div>
  <h2>Checking access…</h2>
</div>
<div class="gate" id="gateLogin">
  <h2>Sign in required</h2>
  <p>You need to sign in as an admin to access the admin hub.</p>
  <p style="margin-top:1rem"><a href="/">Go to login →</a></p>
</div>
<div class="gate" id="gateForbidden">
  <h2>Not authorized</h2>
  <p>This area is for admin users only.</p>
  <p style="margin-top:1rem"><a href="/">Back to dashboard →</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/admin/admin-nav.js"></script>
<script>
const SUPABASE_URL = 'https://iskvvnhacqdxybpmwuni.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlza3Z2bmhhY3FkeHlicG13dW5pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTAyOTYsImV4cCI6MjA5MDA4NjI5Nn0.c3uR-CSQXsgfYMnzK8KOxZjoqRPwaMsUuGpMPwvCsk8';

// ─────────────────────────────────────────────────────────────────────────
// TOOLS — single source of truth for sidebar nav + iframe routes.
// Future tools: add one entry. Each `url` is loaded into the iframe when
// the tool is selected. URL hash (#id) drives default tool on load.
// Each admin page is a standalone HTML file with its own auth gate, so
// loaded standalone OR inside the hub iframe.
// ─────────────────────────────────────────────────────────────────────────
const TOOLS = [
  { id: 'onboard', label: 'Onboard new client', icon: '👤', url: '/admin/onboard.html' },
  // { id: 'audit',   label: 'Audit logs',      icon: '🔍', url: '/admin/audit.html'   },
];

let sb = null;
let session = null;

function showGate(id) {
  ['gateLoading','gateLogin','gateForbidden'].forEach((g) => {
    document.getElementById(g).classList.toggle('visible', g === id);
  });
}

function renderSidebar(activeId) {
  const nav = document.getElementById('sidebar');
  const label = '<div class="sidebar-label">Tools</div>';
  const items = TOOLS.map((t) =>
    `<div class="nav-item${t.id === activeId ? ' active' : ''}" data-id="${t.id}" role="link" tabindex="0">` +
      `<span class="ic">${t.icon}</span><span class="lbl">${t.label}</span>` +
    `</div>`
  ).join('');
  const clientsLink = '<a href="/admin/clients.html" class="nav-item" style="text-decoration:none;"><span class="ic">📋</span><span class="lbl">Manage clients</span></a>';
  nav.innerHTML = label + items + clientsLink;
  nav.querySelectorAll('.nav-item').forEach((el) => {
    el.addEventListener('click', () => selectTool(el.dataset.id));
    el.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectTool(el.dataset.id); } });
  });
}

function selectTool(id) {
  const tool = TOOLS.find((t) => t.id === id) || TOOLS[0];
  if (!tool) return;
  history.replaceState(null, '', '#' + tool.id);
  renderSidebar(tool.id);
  const frame = document.getElementById('toolFrame');
  if (frame.dataset.id !== tool.id) {
    frame.dataset.id = tool.id;
    frame.src = tool.url;
  }
  document.title = `CallMagnet — Admin · ${tool.label}`;
}

async function handleSignout() {
  await sb.auth.signOut();
  window.location.href = '/';
}

document.addEventListener('DOMContentLoaded', async () => {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      storage: window.localStorage,
      storageKey: 'callmagnet-auth-token',
      autoRefreshToken: true,
      detectSessionInUrl: true,
    },
  });

  const { data: { session: s } } = await sb.auth.getSession();
  session = s;

  if (!session) { showGate('gateLogin'); return; }

  const isAdmin = session.user?.app_metadata?.is_admin === true;
  if (!isAdmin) {
    showGate('gateForbidden');
    document.getElementById('signoutBtn').style.display = 'block';
    return;
  }
  window.refreshAdminFab(session);

  document.getElementById('gateLoading').classList.remove('visible');
  document.getElementById('signoutBtn').style.display = 'block';
  document.getElementById('shell').style.display = 'flex';

  // Resolve initial tool from URL hash, fallback to first tool.
  const hashId = (location.hash || '').replace(/^#/, '');
  const initial = TOOLS.find((t) => t.id === hashId) ?? TOOLS[0];
  if (initial) selectTool(initial.id);

  window.addEventListener('hashchange', () => {
    const id = (location.hash || '').replace(/^#/, '');
    const t = TOOLS.find((x) => x.id === id);
    if (t) selectTool(t.id);
  });
});
</script>
</body>
</html>
