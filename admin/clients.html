<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clients — CallMagnet Admin</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/icon.svg?v=2026-05-14" type="image/svg+xml">
<link rel="stylesheet" href="/assets/css/clients-admin.css">
</head>
<body>

<!-- Auth gate: shown while checking session, then hidden (same pattern as middle-man.html) -->
<div id="caAuthGate">Checking access…</div>

<!-- Main page: hidden until auth passes -->
<div id="caPage" style="display:none;">

  <header class="ca-header">
    <span class="ca-header-title">Clients <span id="caCount" class="ca-header-count"></span></span>
    <button id="caBackBtn" class="ca-back-btn">← Dashboard</button>
  </header>

  <div class="ca-body">

    <!-- Search bar -->
    <div class="ca-search-wrap">
      <input
        id="caSearch"
        class="ca-search"
        type="search"
        placeholder="Search by name, owner, email, phone or Twilio number…"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <!-- Client grid — filled by clients-admin.js -->
    <div class="ca-grid" id="caGrid"></div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/clients-admin.js?v=20260603b"></script>
</body>
</html>
