<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Middle Man — CallMagnet Admin</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/icon.svg?v=2026-05-14" type="image/svg+xml">
<link rel="stylesheet" href="/assets/css/middle-man-admin.css?v=20260622a">
<style>
.mma-preview-phone {
  width: 220px;
  height: 477px;
  background: #0E1419;
  border-radius: 32px;
  border: 4px solid #222;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.mma-preview-notch {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 8px;
  background: #111;
  border-radius: 4px;
  z-index: 10;
}
.mma-preview-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}
.mma-preview-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0;
  z-index: 2;
  overflow: hidden;
}
.mma-preview-logo {
  max-height: 44px;
  max-width: 85%;
  object-fit: contain;
  display: block;
  margin: 0 auto 4px;
}
.mma-preview-bizname {
  color: #FFFFFF;
  font-size: 10px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 8px;
  word-break: break-word;
}
.mma-preview-buttons {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-top: 4px;
}
.mma-preview-btn {
  display: block;
  width: 100%;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1.5px solid var(--prev-neon, #06D6A0);
  color: var(--prev-neon, #06D6A0);
  background: rgba(0,0,0,0.35);
  font-size: 9px;
  font-weight: 600;
  text-align: center;
  box-shadow: 0 0 4px var(--prev-neon, #06D6A0), 0 0 8px color-mix(in srgb, var(--prev-neon, #06D6A0) 30%, transparent);
  pointer-events: none;
  user-select: none;
  backdrop-filter: blur(4px);
  margin-bottom: 14px;
}
.mma-preview-btn.glow-off { box-shadow: none; }
.mma-preview-footer {
  position: absolute;
  bottom: 8px;
  left: 0; right: 0;
  text-align: center;
  font-size: 7px;
  color: rgba(255,255,255,0.3);
  z-index: 3;
}
.mma-media-label {
  font-size: 14px;
  font-weight: 600;
  color: #000000;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.mma-video-preview {
  width: 185px;
  height: auto;
  border-radius: 10px;
  object-fit: cover;
  display: block;
}
.mma-bg-thumb {
  width: 185px;
  height: 330px;
  border-radius: 10px;
  object-fit: cover;
  display: block;
}
.mma-video-placeholder {
  width: 185px;
  height: 330px;
  background: rgba(0,0,0,0.06);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  color: rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<!-- Auth gate: shown while checking session, then hidden -->
<div id="mmaAuthGate">Checking access…</div>

<!-- Main page: hidden until auth passes -->
<div id="mmaPage" style="display:none;">
  <header class="mma-header">
    <span class="mma-header-title">Middle Man Manager</span>
    <button id="mmaBackToDashboard" class="mma-back-btn">← Dashboard</button>
    <button onclick="window.location.href='/admin/clients.html'" style="background:#1D4ED8;color:#fff;font-weight:700;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:14px;margin-left:8px;">← Back</button>
  </header>
  <div class="mma-body" id="mmaBody">
    <!-- Filled by middle-man-admin.js -->
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/middle-man-admin.js?v=20260625c"></script>
</body>
</html>
