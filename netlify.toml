# Netlify configuration for callmagnet.com.au
#
# The /b/* rewrite serves the Middle Man landing page for any slug.
# e.g. callmagnet.com.au/b/brunswick-bistro → /b.html (status 200, not a redirect)
# The page reads window.location.pathname to extract the slug.
#
# All other existing .html pages are served as-is; no existing routes are affected.

[[redirects]]
  from   = "/b/*"
  to     = "/b.html"
  status = 200

# /u/<token> opt-out page — token is read from window.location.pathname
# by u.html's inline script. status 200 (rewrite, not redirect) preserves
# the full /u/<token> path so the script can extract the token.
[[redirects]]
  from   = "/u/*"
  to     = "/u.html"
  status = 200
