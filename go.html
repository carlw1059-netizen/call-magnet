<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<style>
body { background: #0d0d0d; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: Arial, sans-serif; }
.msg { text-align: center; color: #f0f0f0; }
.logo { font-family: monospace; font-size: 18px; color: #191970; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1rem; }
.sub { font-size: 13px; color: #888; }
</style>
</head>
<body>
<div class="msg">
  <div class="logo">★ CallMagnet</div>
  <div class="sub">Taking you to your booking...</div>
</div>
<script>
async function redirect() {
  const params = new URLSearchParams(window.location.search);
  const clientId = params.get('id');

  if (!clientId) {
    document.querySelector('.sub').textContent = 'Invalid link.';
    return;
  }

  try {
    const res = await fetch(
      `https://iskvvnhacqdxybpmwuni.supabase.co/functions/v1/get-booking-url?id=${clientId}`,
      {
        headers: {
          Authorization: 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlza3Z2bmhhY3FkeHlicG13dW5pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTAyOTYsImV4cCI6MjA5MDA4NjI5Nn0.c3uR-CSQXsgfYMnzK8KOxZjoqRPwaMsUuGpMPwvCsk8'
        }
      }
    );

    const data = await res.json();

    if (data.booking_url) {
      window.location.href = data.booking_url;
    } else {
      document.querySelector('.sub').textContent = 'Booking link not found.';
    }
  } catch (error) {
    document.querySelector('.sub').textContent = 'Something went wrong. Please try again.';
  }
}

redirect();
</script>
</body>
</html>
