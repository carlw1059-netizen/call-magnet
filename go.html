<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0E1419">
<title>Redirecting…</title>
<link rel="dns-prefetch" href="https://iskvvnhacqdxybpmwuni.supabase.co">
<link rel="preconnect" href="https://iskvvnhacqdxybpmwuni.supabase.co" crossorigin>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0E1419; min-height: 100vh; overscroll-behavior: none; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: rgba(255,255,255,0.92);
    -webkit-font-smoothing: antialiased;
  }
  .card {
    text-align: center;
    padding: 2rem 1.5rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(6,214,160,0.12);
    border-radius: 16px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    max-width: 320px;
    width: 90%;
    box-shadow: 0 0 40px rgba(6,214,160,0.08);
  }
  .star { width: 80px; height: 80px; margin: 0 auto 1.25rem; display: block; filter: drop-shadow(0 0 18px rgba(6,214,160,0.55)); }
  .msg { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.78); letter-spacing: 0.01em; margin-bottom: 1rem; }
  .dots { display: flex; gap: 6px; justify-content: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #06D6A0; opacity: 0.4; animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 100% { opacity: 0.25; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1.1); } }
  .err { color: rgba(204,85,0,0.85); font-size: 13px; }
</style>
</head>
<body>
<div class="card">
  <svg class="star" viewBox="0 0 512 512" aria-hidden="true">
    <polygon
      points="256,108 291,208 396,210 312,272 342,372 256,314 170,372 200,272 116,210 221,208"
      fill="#06D6A0"/>
  </svg>
  <div class="msg" id="msg">Taking you to your booking…</div>
  <div class="dots" id="loader">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
</div>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var clientId = params.get('id');

  function showError(text) {
    var msg = document.getElementById('msg');
    var loader = document.getElementById('loader');
    if (msg) { msg.textContent = text; msg.classList.add('err'); }
    if (loader) loader.style.display = 'none';
  }

  if (!clientId) {
    showError('Invalid link.');
    return;
  }

  fetch(
    'https://iskvvnhacqdxybpmwuni.supabase.co/functions/v1/get-booking-url?id=' + encodeURIComponent(clientId),
    {
      headers: {
        Authorization: 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlza3Z2bmhhY3FkeHlicG13dW5pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTAyOTYsImV4cCI6MjA5MDA4NjI5Nn0.c3uR-CSQXsgfYMnzK8KOxZjoqRPwaMsUuGpMPwvCsk8'
      }
    }
  )
  .then(function (res) { return res.json(); })
  .then(function (data) {
    if (data && data.booking_url) {
      window.location.replace(data.booking_url);
    } else {
      showError('Booking link not found.');
    }
  })
  .catch(function () {
    showError('Something went wrong. Please try again.');
  });
})();
</script>
</body>
</html>
