<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CallMagnet</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CallMagnet">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --border2: #333;
  --text: #f0f0f0;
  --muted: #888;
  --dim: #555;
  --accent: #191970;
  --accent-dim: #19197022;
  --accent-contrast: #fff;
  --amber: #f5a623;
  --amber-dim: #f5a62322;
  --red: #ff4d4d;
  --red-dim: #ff4d4d18;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; font-size: 14px; line-height: 1.5; -webkit-text-size-adjust: 100%; font-weight: 600; overflow-x: hidden; }

.star-pulse { color: var(--accent); animation: pulse 2s infinite; display: inline-block; flex-shrink: 0; line-height: 1; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }

.ptr-indicator { position: fixed; top: 0; left: 0; width: 100%; height: 50px; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 50; transform: translateY(-50px); transition: transform 0.2s ease; font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }
.ptr-indicator.visible { transform: translateY(0); }
.ptr-spinner { width: 16px; height: 16px; border: 2px solid var(--accent-dim); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: var(--bg); }
.login-box { width: 100%; max-width: 380px; }
.login-logo { font-family: var(--mono); font-size: 20px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 2.5rem; display: flex; align-items: center; gap: 10px; font-weight: 700; }
.login-logo .star-pulse { font-size: 20px; }
.login-heading { font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; letter-spacing: -0.02em; }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; font-weight: 600; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; font-family: var(--mono); font-weight: 700; }
.field input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; color: var(--text); font-family: var(--sans); font-size: 14px; outline: none; transition: border-color 0.2s; font-weight: 600; }
.field input:focus { border-color: var(--accent); }
.password-wrap { position: relative; }
.password-wrap input { padding-right: 44px; }
.eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--dim); font-size: 16px; padding: 4px; line-height: 1; transition: color 0.2s; }
.eye-btn:hover { color: var(--accent); }
.remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 0.5rem; }
.remember-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
.remember-row label { font-size: 13px; color: var(--muted); cursor: pointer; font-weight: 600; }
.forgot-link { font-size: 12px; color: var(--accent); font-family: var(--mono); cursor: pointer; text-decoration: underline; margin-bottom: 1rem; display: block; font-weight: 700; letter-spacing: 0.03em; }
.forgot-link:hover { opacity: 0.7; }
.btn-primary { width: 100%; background: var(--accent); color: var(--accent-contrast); border: none; border-radius: 6px; padding: 11px; font-family: var(--sans); font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.error-msg { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-top: 1rem; display: none; font-weight: 600; }
.success-msg { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-top: 1rem; display: none; font-weight: 600; }

.forgot-screen { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 2rem; background: var(--bg); }
.forgot-screen.active { display: flex; }
.back-link { font-size: 12px; color: var(--accent); font-family: var(--mono); cursor: pointer; text-decoration: underline; margin-bottom: 1.5rem; display: block; font-weight: 700; letter-spacing: 0.03em; }
.back-link:hover { opacity: 0.7; }

.dash { display: none; min-height: 100vh; background: var(--bg); }

/* SUSPENSION BANNER */
.suspension-banner { display: none; background: var(--red-dim); border-bottom: 2px solid var(--red); padding: 14px 1.5rem; font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--red); letter-spacing: 0.03em; text-align: center; }
.suspension-banner.active { display: block; }

.topbar { display: flex; justify-content: space-between; align-items: flex-end; padding: 1.2rem 1.5rem 0.8rem 1.5rem; position: sticky; top: 0; background: var(--bg); z-index: 20; overflow: visible; }
.topbar::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%); background-size: 200% 100%; animation: lineSweep 3s ease-in-out infinite; }
@keyframes lineSweep { 0% { background-position: -100% 0; } 100% { background-position: 200% 0; } }
.topbar-logo { font-family: var(--mono); font-size: 27px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; display: flex; align-items: center; gap: 12px; font-weight: 700; line-height: 1; padding-bottom: 4px; }
.topbar-logo .star-pulse { font-size: 27px; }
.topbar-right { display: flex; align-items: center; gap: 8px; position: relative; padding-bottom: 4px; }
.settings-btn { background: none; border: 1px solid var(--accent); color: var(--accent); border-radius: 4px; padding: 5px 10px; font-size: 13px; cursor: pointer; transition: all 0.2s; line-height: 1; font-weight: 700; }
.settings-btn:hover { background: var(--accent); color: var(--accent-contrast); }
.settings-btn.active { background: var(--accent); color: var(--accent-contrast); }
.logout-btn { background: none; border: 1px solid var(--accent); color: var(--accent); border-radius: 4px; padding: 5px 12px; font-size: 12px; font-family: var(--mono); cursor: pointer; transition: all 0.2s; font-weight: 700; letter-spacing: 0.05em; }
.logout-btn:hover { background: var(--accent); color: var(--accent-contrast); }

.settings-panel { position: absolute; top: calc(100% + 8px); right: 0; width: 270px; background: #ffffff; border: 1px solid #dddddd; border-radius: 10px; padding: 1rem; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.3); display: none; animation: slideDown 0.15s ease; }
.settings-panel.open { display: block; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.settings-section { margin-bottom: 1rem; }
.settings-section:last-child { margin-bottom: 0; }
.settings-section-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #111111; margin-bottom: 10px; font-weight: 700; }
.swatch-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.s-swatch { width: 28px; height: 28px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s, border-color 0.15s; position: relative; }
.s-swatch:hover { transform: scale(1.15); }
.s-swatch.selected { border-color: #111111; }
.s-swatch.selected::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: rgba(0,0,0,0.6); }
.s-swatch.dark-check.selected::after { color: rgba(255,255,255,0.8); }
.settings-divider { height: 1px; background: #dddddd; margin: 0.75rem 0; }

.main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
.biz-header { margin-bottom: 1.5rem; }
.biz-name-large { font-size: 36px; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; line-height: 1.1; }
.biz-tagline { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px; font-weight: 700; }
.demo-banner { background: var(--amber-dim); border: 1px solid var(--amber); border-radius: 8px; padding: 12px 16px; font-size: 12px; font-weight: 700; color: var(--amber); margin-bottom: 1.5rem; font-family: var(--mono); letter-spacing: 0.03em; display: none; }

.period-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
.period-nav { display: flex; align-items: center; gap: 0.5rem; }
.nav-btn { background: var(--surface); border: 1px solid var(--accent); color: var(--accent); border-radius: 4px; padding: 5px 12px; font-size: 14px; cursor: pointer; transition: all 0.2s; font-family: var(--mono); font-weight: 700; }
.nav-btn:hover { background: var(--accent); color: var(--accent-contrast); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; background: var(--surface); color: var(--dim); border-color: var(--border); }
.period-label-text { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; min-width: 180px; text-align: center; }
.toggle-row { display: flex; background: var(--surface); border: 1px solid var(--accent); border-radius: 6px; overflow: hidden; }
.toggle-btn { padding: 6px 18px; font-size: 13px; font-family: var(--mono); letter-spacing: 0.05em; background: none; border: none; color: var(--accent); cursor: pointer; transition: all 0.2s; font-weight: 700; }
.toggle-btn.active { background: var(--accent); color: var(--accent-contrast); font-weight: 700; }

.hero { background: var(--accent-dim); border: 1px solid var(--accent); border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; }
.hero-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
.hero-value { font-size: 56px; font-weight: 300; color: var(--accent); letter-spacing: -0.03em; line-height: 1; }
.hero-sub { font-size: 13px; font-weight: 700; color: var(--accent); opacity: 0.8; margin-top: 8px; }

.metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 1rem; }
.metric { background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; padding: 1rem; }
.metric-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
.metric-value { font-size: 32px; font-weight: 300; color: var(--accent); letter-spacing: -0.02em; }
.metric-sub { font-size: 11px; font-weight: 700; color: var(--muted); margin-top: 4px; }

.reset-row { display: flex; justify-content: flex-end; margin-bottom: 1rem; }
.reset-btn { background: none; border: 2px solid var(--accent); color: var(--accent); border-radius: 4px; padding: 6px 14px; font-size: 12px; font-family: var(--mono); letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; font-weight: 700; }
.reset-btn:hover { background: var(--accent); color: var(--accent-contrast); }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 2rem; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 1.5rem; max-width: 340px; width: 100%; }
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
.modal-body { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }
.modal-actions { display: flex; gap: 0.75rem; }
.btn-cancel { flex: 1; background: none; border: 1px solid var(--border2); color: var(--muted); border-radius: 6px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--sans); }
.btn-confirm { flex: 1; background: var(--red); border: none; color: #fff; border-radius: 6px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--sans); }

.renewal-strip { display: flex; align-items: center; margin-bottom: 0.75rem; padding: 10px 14px; background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; }
.renewal-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); font-weight: 700; opacity: 0.7; }
.renewal-value { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent); }
.renewal-thanks { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); }

.section-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
.section-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); font-weight: 700; padding-top: 4px; }

.sms-counter-block { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.call-count-badge { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent); border-radius: 20px; padding: 2px 10px; }

.odometer { display: flex; align-items: stretch; border: 1px solid var(--accent); border-radius: 4px; overflow: hidden; background: var(--surface); }
.odometer-cell { width: 22px; height: 26px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--accent); position: relative; overflow: hidden; }
.odometer-cell .old { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; }
.odometer-cell .new { position: absolute; top: 100%; left: 0; right: 0; height: 100%; display: flex; align-items: center; justify-content: center; }
.odometer-cell.rolling .old { animation: rollOut 0.35s ease forwards; }
.odometer-cell.rolling .new { animation: rollIn 0.35s ease forwards; }
@keyframes rollOut { to { transform: translateY(-100%); opacity: 0; } }
@keyframes rollIn { to { transform: translateY(-100%); } }
.odometer-sep { width: 1px; background: var(--accent); opacity: 0.3; }
.odometer-prefix { width: 20px; height: 26px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent); background: var(--surface); border-right: 1px solid var(--accent); opacity: 0.6; }

.sms-odom-row { display: flex; align-items: center; gap: 6px; }
.sms-month-label { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; opacity: 0.8; }
.overage-row { display: flex; align-items: center; gap: 6px; }
.overage-label { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--red); letter-spacing: 0.05em; }

.activity-card { background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; overflow: hidden; }
.activity-summary { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; transition: background 0.15s; }
.activity-summary:hover { background: var(--surface2); }
.activity-summary-left { display: flex; align-items: center; gap: 10px; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--accent); }
.activity-summary-text { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent); }
.activity-summary-sub { font-size: 11px; font-weight: 600; color: var(--muted); margin-top: 2px; }
.expand-icon { font-size: 11px; color: var(--accent); font-family: var(--mono); transition: transform 0.2s; }
.expand-icon.open { transform: rotate(180deg); }
.activity-dropdown { display: none; border-top: 1px solid var(--border); }
.activity-dropdown.open { display: block; }
.activity-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.activity-row:last-child { border-bottom: none; }
.activity-number { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text); }
.activity-time { font-size: 11px; font-weight: 600; color: var(--dim); margin-top: 1px; }
.status-pill { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }
.empty-state { padding: 2rem; text-align: center; color: var(--dim); font-size: 13px; font-weight: 600; }
.loading { padding: 2rem; text-align: center; color: var(--dim); font-family: var(--mono); font-size: 12px; font-weight: 700; }

@media (max-width: 600px) {
  .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .hero-value { font-size: 40px; }
  .biz-name-large { font-size: 26px; }
  .topbar-logo { font-size: 20px; }
  .topbar-logo .star-pulse { font-size: 20px; }
  .period-controls { flex-direction: column; align-items: flex-start; }
  .settings-panel { width: 230px; }
}
</style>
</head>
