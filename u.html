<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E1419">
<meta name="robots" content="noindex,nofollow">
<title>Stop Texts — CallMagnet</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  min-height: 100%;
}

html, body {
  min-height: 100svh;
  color: #FFFFFF;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

#uApp {
  width: 100%;
  max-width: 380px;
  padding: max(48px, env(safe-area-inset-top)) 28px max(40px, env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

/* ── Loading state ─────────────────────────────────────────────────────── */
#stateLoading {
  font-size: 15px;
  color: rgba(255,255,255,0.38);
  letter-spacing: 0.02em;
}

/* ── Main opt-out UI ───────────────────────────────────────────────────── */
#stateMain { display: none; width: 100%; }

.u-heading {
  font-size: 24px;
  font-weight: 700;
  color: #FFFFFF;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin-bottom: 12px;
}

.u-biz-name {
  color: #FFFFFF;
}


.u-opt-btn {
  display: block;
  width: 100%;
  padding: 18px 24px;
  background: #CC0000;
  border: none;
  border-radius: 12px;
  color: #FFFFFF;
  font-size: 17px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-align: center;
  transition: background 0.12s, transform 0.08s;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 0 20px rgba(204,0,0,0.4);
  margin-bottom: 20px;
}
.u-opt-btn:active { transform: scale(0.97); background: #AA0000; }
.u-opt-btn:disabled { opacity: 0.45; cursor: wait; transform: none; }

/* ── Success state ─────────────────────────────────────────────────────── */
#stateSuccess { display: none; width: 100%; }

.u-success-mark {
  font-size: 52px;
  margin-bottom: 22px;
  color: #06D6A0;
  line-height: 1;
}

.u-success-heading {
  font-size: 22px;
  font-weight: 700;
  color: #FFFFFF;
  margin-bottom: 12px;
}

.u-success-msg {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
}

/* ── Error / expired state ─────────────────────────────────────────────── */
#stateError { display: none; width: 100%; }

.u-error-mark {
  font-size: 44px;
  margin-bottom: 20px;
  opacity: 0.35;
  line-height: 1;
}

.u-error-heading {
  font-size: 20px;
  font-weight: 700;
  color: rgba(255,255,255,0.65);
  margin-bottom: 10px;
}

.u-error-msg {
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  line-height: 1.6;
}

/* ── Powered-by footer ─────────────────────────────────────────────────── */
.u-powered {
  margin-top: 44px;
  font-size: 11px;
  color: #FFFFFF;
  letter-spacing: 0.04em;
}
.u-powered .star { color: #10b981; }
</style>
</head>
<body>
<div id="bgFixed" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background-color:#0E1419;background-size:cover;background-position:center top;overflow:hidden;"></div>
<div id="uApp">

  <!-- Loading -->
  <div id="stateLoading">Checking link…</div>

  <!-- Main: shown when token validates -->
  <div id="stateMain">
    <div class="u-heading">Stop texts from<br><span class="u-biz-name" id="uBizName">this business</span></div>
    <button class="u-opt-btn" id="uOptBtn" type="button">Stop texts</button>
  </div>

  <!-- Success: shown after process-unsubscribe returns ok -->
  <div id="stateSuccess">
    <div class="u-success-mark">✓</div>
    <div class="u-success-heading">Done — no more texts</div>
    <div class="u-success-msg" id="uSuccessMsg">You won't receive any more texts from this business.</div>
  </div>

  <!-- Error: shown for invalid / expired / already-used token -->
  <div id="stateError">
    <div class="u-error-mark">⚠</div>
    <div class="u-error-heading">Link expired</div>
    <div class="u-error-msg">This link has expired or been used already.<br>Reply <strong>STOP</strong> to any SMS to opt out.</div>
  </div>

  <div class="u-powered">Powered by <span class="star">★</span> CallMagnet</div>

</div>

<script>
(function () {
  'use strict';

  var SUPABASE_URL = 'https://iskvvnhacqdxybpmwuni.supabase.co';
  var CONTEXT_URL  = SUPABASE_URL + '/functions/v1/get-unsubscribe-context';
  var UNSUB_URL    = SUPABASE_URL + '/functions/v1/process-unsubscribe';

  // ── Extract token from /u/<token> ─────────────────────────────────────────
  // Netlify rewrites /u/* → /u.html with status 200, so pathname is still
  // /u/<token>. Split and take the last non-empty segment.
  var pathParts = window.location.pathname.replace(/\/+$/, '').split('/');
  var token     = pathParts[pathParts.length - 1] || '';

  // ── DOM references ────────────────────────────────────────────────────────
  var stateLoading = document.getElementById('stateLoading');
  var stateMain    = document.getElementById('stateMain');
  var stateSuccess = document.getElementById('stateSuccess');
  var stateError   = document.getElementById('stateError');
  var bizNameEl    = document.getElementById('uBizName');
  var successMsgEl = document.getElementById('uSuccessMsg');
  var optBtn       = document.getElementById('uOptBtn');

  var businessName = '';
  var pageLoadTime = Date.now();

  function showState(el) {
    var all = [stateLoading, stateMain, stateSuccess, stateError];
    for (var i = 0; i < all.length; i++) {
      if (all[i]) all[i].style.display = 'none';
    }
    if (el) el.style.display = 'block';
  }

  // ── Validate token on load ────────────────────────────────────────────────
  if (!token) {
    showState(stateError);
  } else {
    fetch(CONTEXT_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token: token }),
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (!data || !data.ok) {
        showState(stateError);
        return;
      }
      businessName = data.business_name || 'this business';
      if (bizNameEl) bizNameEl.textContent = businessName;

      // ── Apply client background (mirrors middleman.js logic) ───────────────
      var bgFixed   = document.getElementById('bgFixed');
      var bgUrl     = data.bg_url   || null;
      var bgType    = data.bg_type  || 'image';
      var bgPoster  = data.bg_poster_url || null;

      if (bgFixed && bgUrl && bgType === 'video') {
        var vid = document.createElement('video');
        vid.setAttribute('autoplay', '');
        vid.setAttribute('muted', '');
        vid.setAttribute('loop', '');
        vid.setAttribute('playsinline', '');
        vid.setAttribute('webkit-playsinline', '');
        vid.muted     = true;
        vid.playsInline = true;
        vid.setAttribute('poster', bgPoster ||
          'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7');
        var vsrc = document.createElement('source');
        vsrc.src  = bgUrl;
        vsrc.type = 'video/mp4';
        vid.appendChild(vsrc);
        vid.style.cssText = 'position:absolute;top:50%;left:50%;min-width:100%;min-height:100%;transform:translate(-50%,-50%);object-fit:cover;';
        bgFixed.appendChild(vid);
        vid.play().catch(function() { vid.style.display = 'none'; });
      } else if (bgFixed && bgUrl) {
        bgFixed.style.backgroundImage   = 'url(' + JSON.stringify(bgUrl + '?v=' + Date.now()) + ')';
        bgFixed.style.backgroundSize    = 'cover';
        bgFixed.style.backgroundPosition = 'center top';
      }

      showState(stateMain);
    })
    .catch(function() {
      showState(stateError);
    });
  }

  // ── Opt out button ────────────────────────────────────────────────────────
  if (optBtn) {
    optBtn.addEventListener('click', function() {
      if (optBtn.disabled) return;
      optBtn.disabled    = true;
      optBtn.textContent = 'Processing…';

      var timeToDecide = Date.now() - pageLoadTime;

      fetch(UNSUB_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token:             token,
          choice:            'forever',
          time_to_decide_ms: timeToDecide,
          came_from:         'middle_man',
          user_agent:        navigator.userAgent,
          referrer:          document.referrer || null,
        }),
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data && data.ok) {
          if (successMsgEl) {
            successMsgEl.textContent =
              'You won\'t receive any more texts from ' + businessName + '.';
          }
          showState(stateSuccess);
        } else {
          // Token may have already been consumed (e.g. double-tap)
          showState(stateError);
        }
      })
      .catch(function() {
        // Network error — restore so user can retry
        optBtn.disabled    = false;
        optBtn.textContent = 'Stop texts';
      });
    });
  }


})();
</script>
</body>
</html>
