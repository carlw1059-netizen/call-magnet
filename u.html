<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E1419">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex,nofollow">
<title>Stop Texts — CallMagnet</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  min-height: 100%;
  background-color: #0E1419;
}

html, body {
  min-height: 100svh;
  background-color: #0E1419;
  color: #FFFFFF;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

#uApp {
  width: 100%;
  max-width: 380px;
  padding: max(48px, env(safe-area-inset-top)) 28px max(40px, env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

/* ── Loading state ─────────────────────────────────────────────────────── */
#stateLoading {
  font-size: 15px;
  color: rgba(255,255,255,0.38);
  letter-spacing: 0.02em;
}

/* ── Main opt-out UI ───────────────────────────────────────────────────── */
#stateMain { display: none; width: 100%; }

.u-heading {
  font-size: 24px;
  font-weight: 700;
  color: #FFFFFF;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin-bottom: 12px;
}

.u-biz-name {
  color: #FFFFFF;
}


.u-opt-btn {
  display: block;
  width: 100%;
  padding: 18px 24px;
  background: #ffffff;
  border: none;
  border-radius: 12px;
  color: #CC0000;
  font-size: 17px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-align: center;
  transition: box-shadow 0.12s, transform 0.08s;
  -webkit-tap-highlight-color: transparent;
  outline: 2px solid #CC0000;
  outline-offset: -6px;
  box-shadow: 0 0 28px rgba(204,0,0,0.55), 0 0 10px rgba(204,0,0,0.3), 0 0 60px rgba(204,0,0,0.15);
  margin-bottom: 20px;
}
.u-opt-btn:active { transform: scale(0.97); }
.u-opt-btn:disabled { opacity: 0.45; cursor: wait; transform: none; }

/* ── Success state ─────────────────────────────────────────────────────── */
#stateSuccess { display: none; width: 100%; }

.u-success-mark {
  font-size: 52px;
  margin-bottom: 22px;
  color: #06D6A0;
  line-height: 1;
}

.u-success-heading {
  font-size: 22px;
  font-weight: 700;
  color: #FFFFFF;
  margin-bottom: 12px;
}

.u-success-msg {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
}

/* ── Error / expired state ─────────────────────────────────────────────── */
#stateError { display: none; width: 100%; }

.u-error-mark {
  font-size: 44px;
  margin-bottom: 20px;
  opacity: 0.35;
  line-height: 1;
}

.u-error-heading {
  font-size: 20px;
  font-weight: 700;
  color: rgba(255,255,255,0.65);
  margin-bottom: 10px;
}

.u-error-msg {
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  line-height: 1.6;
}

/* ── Phone entry state ─────────────────────────────────────────────────── */
#statePhone { display: none; width: 100%; }

.u-phone-input {
  display: block;
  width: 100%;
  padding: 16px 18px;
  margin-bottom: 12px;
  background: #ffffff;
  border: none;
  border-radius: 12px;
  color: #10b981;
  font-size: 17px;
  font-weight: 700;
  font-family: inherit;
  text-align: center;
  outline: 2px solid #10b981;
  outline-offset: -6px;
  box-shadow: 0 0 28px rgba(16,185,129,0.55), 0 0 10px rgba(16,185,129,0.3), 0 0 60px rgba(16,185,129,0.15);
  -webkit-appearance: none;
}
.u-phone-input::placeholder { color: rgba(16,185,129,0.4); }
.u-phone-input:focus { outline-color: #10b981; }

.u-phone-error {
  font-size: 13px;
  color: #ff6b6b;
  margin-bottom: 12px;
  min-height: 18px;
}

/* ── Powered-by footer ─────────────────────────────────────────────────── */
.u-powered {
  margin-top: 44px;
  font-size: 11px;
  color: #FFFFFF;
  letter-spacing: 0.04em;
}
.u-powered .star { color: #10b981; }
</style>
</head>
<body>
<div id="bgFixed" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background-color:#0E1419;background-size:cover;background-position:center top;overflow:hidden;"></div>
<div id="uApp">

  <!-- Loading -->
  <div id="stateLoading">Checking link…</div>

  <!-- Main: shown when token validates -->
  <div id="stateMain">
    <div class="u-heading">Stop texts from<br><span class="u-biz-name" id="uBizName">this business</span></div>
    <button class="u-opt-btn" id="uOptBtn" type="button">Stop texts</button>
  </div>

  <!-- Success: shown after process-unsubscribe returns ok -->
  <div id="stateSuccess">
    <div class="u-success-mark">✓</div>
    <div class="u-success-heading">Done — no more texts</div>
    <div class="u-success-msg" id="uSuccessMsg">You won't receive any more texts from this business.</div>
  </div>

  <!-- Phone entry: shown when no token in URL -->
  <div id="statePhone">
    <div class="u-heading">Stop texts from<br><span class="u-biz-name" id="uPhoneBizName">this business</span></div>
    <input class="u-phone-input" id="uPhoneInput" type="tel" inputmode="numeric" placeholder="0412 345 678" autocomplete="tel">
    <div class="u-phone-error" id="uPhoneError"></div>
    <button class="u-opt-btn" id="uPhoneBtn" type="button">Stop texts</button>
  </div>

  <!-- Error: shown for invalid / expired / already-used token -->
  <div id="stateError">
    <div class="u-error-mark">⚠</div>
    <div class="u-error-heading">Already opted out</div>
    <div class="u-error-msg">This link has already been used.<br>You won't receive any more texts.</div>
  </div>

  <div class="u-powered">Powered by <span class="star">★</span> CallMagnet</div>

</div>

<script>
(function () {
  'use strict';

  var SUPABASE_URL   = 'https://iskvvnhacqdxybpmwuni.supabase.co';
  var CONTEXT_URL    = SUPABASE_URL + '/functions/v1/get-unsubscribe-context';
  var UNSUB_URL      = SUPABASE_URL + '/functions/v1/process-unsubscribe';
  var OPT_BY_PHONE   = SUPABASE_URL + '/functions/v1/opt-out-by-phone';

  // ── Extract token or slug from /u/<token|slug> ────────────────────────────
  // Netlify rewrites /u/* → /u.html. Pathname is still /u/<segment>.
  // UUID → it's a token. Anything else → it's a slug (no-token flow).
  var pathParts = window.location.pathname.replace(/\/+$/, '').split('/');
  var pathSeg   = pathParts[pathParts.length - 1] || '';
  var isUuid    = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(pathSeg);
  var token     = isUuid ? pathSeg : '';
  var slug      = isUuid ? '' : pathSeg;

  // ── DOM references ────────────────────────────────────────────────────────
  var stateLoading  = document.getElementById('stateLoading');
  var stateMain     = document.getElementById('stateMain');
  var statePhone    = document.getElementById('statePhone');
  var stateSuccess  = document.getElementById('stateSuccess');
  var stateError    = document.getElementById('stateError');
  var bizNameEl     = document.getElementById('uBizName');
  var phoneBizNameEl = document.getElementById('uPhoneBizName');
  var successMsgEl  = document.getElementById('uSuccessMsg');
  var optBtn        = document.getElementById('uOptBtn');
  var phoneInput    = document.getElementById('uPhoneInput');
  var phoneBtn      = document.getElementById('uPhoneBtn');
  var phoneErrorEl  = document.getElementById('uPhoneError');

  var businessName = '';
  var pageLoadTime = Date.now();

  function showState(el) {
    var all = [stateLoading, stateMain, statePhone, stateSuccess, stateError];
    for (var i = 0; i < all.length; i++) {
      if (all[i]) all[i].style.display = 'none';
    }
    if (el) el.style.display = 'block';
  }

  // ── Validate token on load ────────────────────────────────────────────────
  if (!token && !slug) {
    showState(stateError);
  } else if (!token && slug) {
    // No token — show phone entry form so they can opt out by number
    showState(statePhone);
  } else {
    fetch(CONTEXT_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token: token }),
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (!data || !data.ok) {
        showState(stateError);
        return;
      }
      businessName = data.business_name || 'this business';
      if (bizNameEl) bizNameEl.textContent = businessName;

      // ── Apply client background (mirrors middleman.js logic) ───────────────
      var bgFixed   = document.getElementById('bgFixed');
      var bgUrl     = data.bg_url   || null;
      var bgType    = data.bg_type  || 'image';
      var bgPoster  = data.bg_poster_url || null;

      if (bgFixed && bgUrl && bgType === 'video') {
        var vid = document.createElement('video');
        vid.setAttribute('autoplay', '');
        vid.setAttribute('muted', '');
        vid.setAttribute('loop', '');
        vid.setAttribute('playsinline', '');
        vid.setAttribute('webkit-playsinline', '');
        vid.muted     = true;
        vid.playsInline = true;
        vid.setAttribute('poster', bgPoster ||
          'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7');
        var vsrc = document.createElement('source');
        vsrc.src  = bgUrl;
        vsrc.type = 'video/mp4';
        vid.appendChild(vsrc);
        vid.style.cssText = 'position:absolute;top:50%;left:50%;min-width:100%;min-height:100%;transform:translate(-50%,-50%);object-fit:cover;';
        vid.addEventListener('canplay', function() {
          vid.play().catch(function(err) {
            console.warn('[u.html video] play() blocked after canplay:', err.name);
          });
        }, { once: true });
        bgFixed.appendChild(vid);
        vid.load();
      } else if (bgFixed && bgUrl) {
        bgFixed.style.backgroundImage   = 'url(' + JSON.stringify(bgUrl + '?v=' + Date.now()) + ')';
        bgFixed.style.backgroundSize    = 'cover';
        bgFixed.style.backgroundPosition = 'center top';
      }

      showState(stateMain);
    })
    .catch(function() {
      showState(stateError);
    });
  }

  // ── Opt out button ────────────────────────────────────────────────────────
  if (optBtn) {
    optBtn.addEventListener('click', function() {
      if (optBtn.disabled) return;
      optBtn.disabled    = true;
      optBtn.textContent = 'Processing…';

      var timeToDecide = Date.now() - pageLoadTime;

      fetch(UNSUB_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token:             token,
          choice:            'forever',
          time_to_decide_ms: timeToDecide,
          came_from:         'middle_man',
          user_agent:        navigator.userAgent,
          referrer:          document.referrer || null,
        }),
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data && data.ok) {
          if (successMsgEl) {
            successMsgEl.textContent =
              'You won\'t receive any more texts from ' + businessName + '.';
          }
          showState(stateSuccess);
        } else {
          // Token may have already been consumed (e.g. double-tap)
          showState(stateError);
        }
      })
      .catch(function() {
        // Network error — restore so user can retry
        optBtn.disabled    = false;
        optBtn.textContent = 'Stop texts';
      });
    });
  }

  // ── Phone entry button ────────────────────────────────────────────────────
  if (phoneBtn) {
    phoneBtn.addEventListener('click', function() {
      if (phoneBtn.disabled) return;
      var phone = phoneInput ? phoneInput.value.trim() : '';
      if (!phone) {
        if (phoneErrorEl) phoneErrorEl.textContent = 'Please enter your mobile number.';
        return;
      }
      if (phoneErrorEl) phoneErrorEl.textContent = '';
      phoneBtn.disabled    = true;
      phoneBtn.textContent = 'Processing…';

      fetch(OPT_BY_PHONE, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ slug: slug, phone_number: phone }),
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data && data.ok) {
          showState(stateSuccess);
        } else if (data && data.error === 'invalid_phone') {
          if (phoneErrorEl) phoneErrorEl.textContent = 'Please enter a valid Australian mobile number.';
          phoneBtn.disabled    = false;
          phoneBtn.textContent = 'Stop texts';
        } else {
          showState(stateError);
        }
      })
      .catch(function() {
        phoneBtn.disabled    = false;
        phoneBtn.textContent = 'Stop texts';
      });
    });
  }

})();
</script>
</body>
</html>
